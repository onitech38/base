<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Projeto Base</title>

        <!-- CSS principal (importa todos os outros) -->
        <link rel="stylesheet" href="assets/css/style.css" />
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#000000" />
    </head>

    <body>
        <header>
            <nav id="main-nav">
              <div class="nav-left">
                <span id="nav-user" style="display:none;"></span>
              </div>
            
              <div class="nav-center">
                <strong id="nav-logo">LOGO</strong>
              </div>
            
              <div class="nav-right">
                <button data-page="process-builder" id="nav-process" style="display:none;">
                  Process Builder
                </button>
                <button id="nav-logout" style="display:none;">
                  Log out
                </button>
              </div>
            </nav>

            <!-- Estado do projeto -->
            <div id="project-status">Setup</div>

            <!-- Etapas -->
            <div id="project-steps">
                <span data-step="setup">Setup</span>
                <span data-step="planning">Planeamento</span>
                <span data-step="execution">Execução</span>
            </div>

            <!-- ✅ PROGRESSO GLOBAL (ESTAVA A FALTAR) -->
            <div id="global-progress">
                <span id="progress-value">0%</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </header>

        <!-- Aqui o router carrega as páginas -->
        <main id="app"></main>

        <!--
        <script>
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("/service-worker.js");
            }
        </script>
        -->
        <script type="module" src="assets/js/router.js"></script>
        <script type="module" src="assets/js/app.js"></script>

        <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
        <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    </body>
</html>
