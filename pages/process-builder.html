<section class="page page-process-builder" data-page="process-builder">
    <header class="page-header">
        <h1 id="pb-current-title">Processos</h1>
        <p class="pb-intro">
            Este é o plano do teu projeto. Executa os processos pela ordem.
        </p>
        <p id="pb-hint"></p>
    </header>

    <div class="page-content">
        <!-- LISTA DE PROCESSOS -->
        <div id="pb-process-list"></div>

        <!-- ÁREA DE TAREFAS -->
        <div id="pb-task-area" style="display: none">
            <ul id="pb-task-list"></ul>

            <button id="pb-back">Voltar aos processos</button>
        </div>

        <!-- CRIAR PROCESSO MANUAL -->
        <div class="pb-create">
            <input id="pb-process-name" placeholder="Novo processo" />
            <button id="pb-create-process">CRIAR PROCESSO</button>
        </div>
    </div>
</section>
