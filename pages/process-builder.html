<section class="page page-process-builder" data-page="process-builder">
  <header class="page-header">
    <h1>Progress Builder</h1>
    <p>
      Este é o plano do teu projeto. Executa os processos pela ordem.
    </p>
  </header>

  <div class="page-content">

    <!-- PLANO GERAL -->
    <div id="pb-plan-view">

      <ul id="pb-process-list"></ul>

    </div>

    <!-- TASK VIEW -->
    <div id="pb-task-view" style="display:none;">
      <h2 id="pb-task-title"></h2>
      <p id="pb-task-description"></p>

      <button id="pb-task-done">
        Marcar como concluída
      </button>

      <button id="pb-back-to-process">
        Voltar ao processo
      </button>
    </div>

  </div>
</section>
