<section class="page page-signup">
    <header class="page-header">
        <h1>Criar conta</h1>
        <p>Cria uma conta para iniciar um novo projeto.</p>
    </header>

    <form id="signup-form">
        <input id="signup-firstname" placeholder="Nome" />
        <input id="signup-lastname" placeholder="Apelido" />
        <input id="signup-password" type="password" placeholder="Password" />
        <button type="submit">Criar conta</button>
    </form>
</section>
