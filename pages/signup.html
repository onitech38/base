<section class="page page-signup">
    <h1>Criar conta</h1>

    <p>Cria uma conta para começares a estruturar o teu projeto.</p>

    <form class="auth-form">
        <label>
            Primeiro nome
            <input type="text" required />
        </label>

        <label>
            Último nome
            <input type="text" required />
        </label>

        <label>
            Password
            <input type="password" required />
        </label>

        <label>
            Confirmar password
            <input type="password" required />
        </label>

        <button type="submit">Criar conta</button>
    </form>

    <p class="auth-note">
        Já tens conta?
        <a href="#/login">Log in</a>
    </p>
</section>
