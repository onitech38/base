<section class="page page-branding" data-page="branding">
    <header class="page-header">
        <h1>Branding</h1>
        <p>Define cores, tipografia e tema do projeto.</p>
    </header>

    <div class="page-content">
        <label>
            Cor primária
            <input type="color" id="brand-primary" />
        </label>

        <label>
            Cor secundária
            <input type="color" id="brand-secondary" />
        </label>

        <label>
            Tipografia principal
            <select id="brand-font">
                <option value="">Seleciona</option>
                <option value="Inter">Inter</option>
                <option value="Roboto">Roboto</option>
                <option value="System">System UI</option>
            </select>
        </label>

        <label>
            <input type="checkbox" id="brand-darkmode" checked />
            Suportar Dark Mode
        </label>

        <button id="branding-save">Guardar Branding</button>
    </div>
</section>
